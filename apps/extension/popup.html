<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=360">
  <link rel="stylesheet" href="popup.css">
  <title>DITTOO</title>
</head>
<body>
  <div class="popup">
    <!-- Header -->
    <header class="header">
      <div class="logo">
        <svg class="logo-icon" width="28" height="28" viewBox="0 0 28 28" fill="none">
          <rect width="28" height="28" rx="6" fill="#ff3333"/>
          <circle cx="14" cy="14" r="6" fill="white"/>
        </svg>
        <span class="logo-text">DITTOO</span>
      </div>
      <button class="settings-btn" id="settingsBtn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 10a2 2 0 100-4 2 2 0 000 4z"/>
          <path fill-rule="evenodd" d="M6.5 1a.5.5 0 00-.5.5v.72a5.48 5.48 0 00-1.46.85l-.63-.36a.5.5 0 00-.68.18l-1.5 2.6a.5.5 0 00.18.68l.63.36A5.53 5.53 0 002.28 8c0 .56.08 1.1.24 1.61l-.63.36a.5.5 0 00-.18.68l1.5 2.6a.5.5 0 00.68.18l.63-.36c.43.35.92.63 1.46.85v.72a.5.5 0 00.5.5h3a.5.5 0 00.5-.5v-.72a5.48 5.48 0 001.46-.85l.63.36a.5.5 0 00.68-.18l1.5-2.6a.5.5 0 00-.18-.68l-.63-.36c.16-.51.24-1.05.24-1.61s-.08-1.1-.24-1.61l.63-.36a.5.5 0 00.18-.68l-1.5-2.6a.5.5 0 00-.68-.18l-.63.36A5.48 5.48 0 009.5 2.22V1.5a.5.5 0 00-.5-.5h-3zM8 11a3 3 0 100-6 3 3 0 000 6z"/>
        </svg>
      </button>
    </header>

    <!-- Mode Selector -->
    <section class="section">
      <label class="section-label">Recording Mode</label>
      <div class="mode-selector" id="modeSelector">
        <button class="mode-btn active" data-mode="screen-cam" title="Screen + Camera">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <rect x="1" y="3" width="14" height="10" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <path d="M4 15h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="15" cy="14" r="4" fill="currentColor" opacity="0.6"/>
          </svg>
          <span>Screen + Cam</span>
        </button>
        <button class="mode-btn" data-mode="screen" title="Screen Only">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <rect x="2" y="3" width="16" height="11" rx="1.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <path d="M6 16h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          <span>Screen</span>
        </button>
        <button class="mode-btn" data-mode="camera" title="Camera Only">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="currentColor">
            <circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
            <circle cx="10" cy="10" r="3" fill="currentColor"/>
          </svg>
          <span>Camera</span>
        </button>
      </div>
    </section>

    <!-- Device Selection -->
    <section class="section">
      <div class="device-row">
        <label class="device-label">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <circle cx="7" cy="5" r="4" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <path d="M3 13c0-2.2 1.8-4 4-4s4 1.8 4 4" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          </svg>
          Camera
        </label>
        <select class="device-select" id="cameraSelect">
          <option value="">No camera found</option>
        </select>
      </div>
      <div class="device-row">
        <label class="device-label">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
            <rect x="5" y="1" width="4" height="8" rx="2" stroke="currentColor" stroke-width="1.2" fill="none"/>
            <path d="M3 7a4 4 0 008 0" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/>
            <line x1="7" y1="11" x2="7" y2="13" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
          Microphone
        </label>
        <select class="device-select" id="micSelect">
          <option value="">No microphone found</option>
        </select>
      </div>
    </section>

    <!-- Quality -->
    <section class="section">
      <label class="section-label">Quality</label>
      <div class="quality-selector" id="qualitySelector">
        <button class="quality-btn active" data-quality="1080">1080p</button>
        <button class="quality-btn" data-quality="720">720p</button>
      </div>
    </section>

    <!-- Record Button -->
    <div class="record-section">
      <button class="record-btn" id="recordBtn">
        <span class="record-dot"></span>
        Start Recording
      </button>
    </div>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- Login -->
    <div class="login-section" id="loginSection">
      <a href="#" class="login-link" id="loginLink">Login to DITTOO</a>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <span class="version">v0.1.0</span>
      <a href="https://dittoo.com" class="footer-link" target="_blank">dittoo.com</a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
